<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rodilla">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0e12">
<title>Rodilla Fuerte</title>
<style>
:root{
  --bg:#0d0e12;--card:#161720;--lifted:#1e1f2b;--border:#252635;
  --accent:#e8715a;--adim:rgba(232,113,90,.15);
  --teal:#3dd0cc;--tdim:rgba(61,208,204,.1);
  --text:#f0eee8;--muted:#7a7b8e;--dim:#3d3e52;
  --p1:#3dd0cc;--p2:#f4a261;--p3:#a78bfa;
  --sbt:env(safe-area-inset-bottom,0px);--stt:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;min-height:100vh;overscroll-behavior:none}
.hdr{position:fixed;top:0;left:0;right:0;z-index:99;background:rgba(13,14,18,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:calc(var(--stt) + 14px) 18px 12px}
.hdr-inner{display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-size:20px;font-weight:800;letter-spacing:-.5px}
.hdr-logo span{color:var(--accent)}
.phase-tag{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;transition:all .3s}
.main{padding-top:calc(var(--stt) + 68px);padding-bottom:calc(var(--sbt) + 72px)}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(14,15,20,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);padding-bottom:var(--sbt)}
.ni{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;cursor:pointer;color:var(--dim);transition:color .2s;gap:3px;user-select:none}
.ni.active{color:var(--accent)}
.ni svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ni-lbl{font-size:10px;font-weight:600;letter-spacing:.3px}
.tab{display:none}.tab.active{display:block}
.dh{padding:24px 18px 12px}
.dh-date{font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.dh-name{font-size:30px;font-weight:900;letter-spacing:-1.2px;line-height:1}
.dh-focus{font-size:14px;color:var(--muted);margin-top:5px}
.dh-pill{display:inline-block;margin-top:10px;padding:4px 13px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid}
.prog-wrap{margin:0 18px 4px;display:flex;align-items:center;gap:12px}
.prog-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
.prog-bar{flex:1;height:5px;background:var(--lifted);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:10px;background:var(--accent);transition:width .4s ease}
.prog-pct{font-size:12px;font-weight:800;color:var(--accent);min-width:36px;text-align:right}
.pain-row{padding:0 18px 14px;display:flex;align-items:center;gap:10px}
.pain-lbl{font-size:12px;color:var(--muted);white-space:nowrap}
.pain-btns{display:flex;gap:5px}
.pb{width:34px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.pb.sel{background:var(--adim);border-color:var(--accent);color:var(--accent)}
.exs{padding:0 18px}
.ec{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px;margin-bottom:11px;transition:opacity .3s}
.ec.done-card{opacity:.6}
.ec-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px}
.ec-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.ec-meta{flex:1;min-width:0}
.ec-name{font-size:15px;font-weight:800;margin-bottom:3px;letter-spacing:-.3px}
.ec-spec{font-size:12px;color:var(--muted);font-weight:500}
/* SVG más pequeño y bonito */
.ec-svg-wrap{border-radius:12px;overflow:hidden;background:rgba(255,255,255,.02);border:1px solid var(--border);margin-bottom:11px;display:flex;align-items:center;justify-content:center;height:72px}
.ec-svg-wrap svg{width:100%;height:72px}
.ec-steps{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:11px}
.ec-step{display:flex;gap:8px;margin-bottom:4px}
.ec-step-num{min-width:18px;height:18px;border-radius:50%;background:var(--lifted);border:1px solid var(--border);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;margin-top:1px}
.sets-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.sb{flex:1;min-width:42px;max-width:72px;height:35px;border-radius:10px;border:1.5px solid var(--border);background:var(--lifted);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.sb.done{background:var(--accent);border-color:var(--accent);color:#fff}
.sci-pill{display:flex;gap:8px;padding:8px 10px;background:var(--tdim);border:1px solid rgba(61,208,204,.2);border-radius:9px;font-size:12px;color:var(--teal);line-height:1.45}
.timer-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tbtn{flex:1;height:42px;border-radius:12px;border:1.5px solid var(--accent);background:transparent;color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;transition:background .2s,color .2s}
.tbtn:active{background:var(--accent);color:#fff}
.tdisp{font-size:22px;font-weight:900;color:var(--accent);min-width:58px;text-align:center;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.rest-card{margin:20px 18px;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:32px 20px;text-align:center}
.rest-emoji{font-size:52px;margin-bottom:14px;line-height:1}
.rest-title{font-size:24px;font-weight:900;margin-bottom:8px;letter-spacing:-.5px}
.rest-text{font-size:14px;color:var(--muted);line-height:1.6;max-width:280px;margin:0 auto}
.motiv{margin:14px 18px;padding:16px;background:linear-gradient(135deg,var(--adim),rgba(61,208,204,.06));border:1px solid rgba(232,113,90,.2);border-radius:16px;text-align:center}
.motiv-txt{font-size:15px;font-weight:700;line-height:1.4}
.motiv-sub{font-size:12px;color:var(--muted);margin-top:4px}
.done-banner{display:none;margin:14px 18px;padding:22px 20px;background:rgba(232,113,90,.1);border:1px solid rgba(232,113,90,.3);border-radius:16px;text-align:center}
.done-banner.show{display:block}
.done-emoji{font-size:36px;margin-bottom:8px}
.done-title{font-size:17px;font-weight:800;margin-bottom:5px}
.done-sub{font-size:13px;color:var(--muted)}
.sec{padding:20px 18px 0}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:12px}
.wdc{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden}
.wdc.today-day{border-color:var(--accent)}
.wdh{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;cursor:pointer;user-select:none}
.wdl{display:flex;align-items:center;gap:11px}
.wdcirc{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.wdinfo .dname{font-size:15px;font-weight:700}
.wdinfo .dfoc{font-size:12px;color:var(--muted)}
.chev{color:var(--dim);font-size:12px;transition:transform .2s}
.wdh.open .chev{transform:rotate(180deg)}
.wdbody{display:none;padding:0 15px 13px}
.wdbody.open{display:block}
.wei{display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid var(--border);font-size:13px}
.wei:first-child{border-top:none}
.wei-name{flex:1;font-weight:500}
.wei-spec{color:var(--muted);font-size:12px;font-weight:600}
.phases-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:0 18px}
.ph-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 11px;text-align:center}
.ph-card.ph-active{border-color:var(--accent)}
.ph-card.ph-done{opacity:.45}
.ph-num{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.ph-weeks{font-size:18px;font-weight:900;margin-bottom:3px}
.ph-desc{font-size:11px;color:var(--muted);line-height:1.3}
.ph-dot{font-size:10px;margin-top:5px;font-weight:700}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:0 18px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px 10px;text-align:center}
.stat-val{font-size:26px;font-weight:900;line-height:1;margin-bottom:4px;letter-spacing:-.5px}
.stat-lbl{font-size:11px;color:var(--muted);font-weight:500}
.advance-wrap{padding:14px 18px}
.advance-hint{font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px;line-height:1.5}
.advance-btn{width:100%;height:48px;border-radius:14px;background:var(--accent);border:none;color:#fff;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:-.3px}
.ph-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.ph-row:last-child{border-bottom:none}
.ph-date{font-size:12px;color:var(--muted)}
.ph-bar-wrap{display:flex;align-items:center;gap:8px}
.ph-bar{height:6px;border-radius:3px;min-width:8px}
.ph-score{font-size:13px;font-weight:800;min-width:28px;text-align:right}
.sc-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px;margin-bottom:10px}
.sc-title{font-size:15px;font-weight:800;margin-bottom:8px;letter-spacing:-.3px;display:flex;align-items:center;gap:7px}
.sc-body{font-size:13px;color:var(--muted);line-height:1.65}
.sc-body strong{color:var(--teal);font-weight:700}
.warn-card{border-color:rgba(232,113,90,.25)}
.today-badge{font-size:9px;color:var(--accent);background:var(--adim);padding:2px 7px;border-radius:10px;font-weight:700;margin-left:5px;vertical-align:middle}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ec{animation:slideUp .3s ease both}
.ec:nth-child(1){animation-delay:.04s}.ec:nth-child(2){animation-delay:.09s}.ec:nth-child(3){animation-delay:.14s}.ec:nth-child(4){animation-delay:.19s}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-logo">Rodilla<span>.</span></div>
    <div class="phase-tag" id="phaseBadge">Fase 1</div>
  </div>
</header>
<main class="main">
  <div class="tab active" id="tab-hoy"></div>
  <div class="tab" id="tab-semana"></div>
  <div class="tab" id="tab-progreso"></div>
  <div class="tab" id="tab-ciencia"></div>
</main>
<nav class="nav">
  <div class="ni active" onclick="goTab('hoy',this)">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="ni-lbl">Hoy</span>
  </div>
  <div class="ni" onclick="goTab('semana',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="ni-lbl">Semana</span>
  </div>
  <div class="ni" onclick="goTab('progreso',this)">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span class="ni-lbl">Progreso</span>
  </div>
  <div class="ni" onclick="goTab('ciencia',this)">
    <svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
    <span class="ni-lbl">Ciencia</span>
  </div>
</nav>
<script>
// ── COLORES BASE ──────────────────────────
const W='rgba(230,226,218,.9)';  // cuerpo pasivo
const A='#e8715a';               // zona activa (coral)
const T='#3dd0cc';               // flechas movimiento (teal)
const WD='rgba(230,226,218,.45)';// cuerpo pasivo secundario

// ── SVG ILUSTRACIONES ─────────────────────
// Figuras limpias, sin texto, zona activa en coral, flechas en teal
const SVGS={

// QUAD SET — tumbada, pierna recta contraída
qset:`<svg viewBox="0 0 220 72" fill="none">
  <rect width="220" height="72" rx="11" fill="rgba(255,255,255,.02)"/>
  <!-- suelo -->
  <line x1="10" y1="62" x2="210" y2="62" stroke="rgba(255,255,255,.08)" stroke-width="1.5"/>
  <!-- cabeza -->
  <circle cx="196" cy="44" r="10" fill="${W}"/>
  <!-- torso horizontal -->
  <line x1="186" y1="47" x2="100" y2="51" stroke="${W}" stroke-width="8" stroke-linecap="round"/>
  <!-- pierna doblada (rodilla protección) -->
  <line x1="130" y1="51" x2="118" y2="38" stroke="${W}" stroke-width="6" stroke-linecap="round"/>
  <line x1="118" y1="38" x2="100" y2="44" stroke="${W}" stroke-width="6" stroke-linecap="round"/>
  <!-- pierna activa recta — coral -->
  <line x1="100" y1="51" x2="28" y2="56" stroke="${A}" stroke-width="8" stroke-linecap="round"/>
  <line x1="28" y1="56" x2="16" y2="52" stroke="${A}" stroke-width="5" stroke-linecap="round"/>
  <!-- flechas aprieta -->
  <path d="M64 44 L58 50 L64 56" stroke="${T}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M50 44 L56 50 L50 56" stroke="${T}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>`,

// SLR — pierna recta elevada 45°
slr:`<svg viewBox="0 0 220 72" fill="none">
  <rect width="220" height="72" rx="11" fill="rgba(255,255,255,.02)"/>
  <line x1="10" y1="62" x2="210" y2="62" stroke="rgba(255,255,255,.08)" stroke-width="1.5"/>
  <circle cx="196" cy="46" r="10" fill="${W}"/>
  <line x1="186" y1="49" x2="100" y2="53" stroke="${W}" stroke-width="8" stroke-linecap="round"/>
  <!-- rodilla doblada -->
  <line x1="132" y1="53" x2="118" y2="40" stroke="${W}" stroke-width="6" stroke-linecap="round"/>
  <line x1="118" y1="40" x2="100" y2="47" stroke="${W}" stroke-width="6" stroke-linecap="round"/>
  <!-- pierna elevada activa — coral -->
  <line x1="100" y1="53" x2="62" y2="24" stroke="${A}" stroke-width="8" stroke-linecap="round"/>
  <line x1="62" y1="24" x2="50" y2="18" stroke="${A}" stroke-width="5" stroke-linecap="round"/>
  <!-- flecha arriba -->
  <path d="M34 44 L42 28 L50 44" stroke="${T}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>`,

// WALL SIT — espalda en pared, rodillas 30°
wallsit:`<svg viewBox="0 0 220 72" fill="none">
  <rect width="220" height="72" rx="11" fill="rgba(255,255,255,.02)"/>
  <!-- pared -->
  <rect x="190" y="8" width="10" height="64" rx="3" fill="rgba(255,255,255,.15)"/>
  <!-- suelo -->
  <line x1="10" y1="67" x2="200" y2="67" stroke="rgba(255,255,255,.08)" stroke-width="1.5"/>
  <!-- cabeza -->
  <circle cx="178" cy="20" r="10" fill="${W}"/>
  <!-- torso vertical -->
  <line x1="178" y1="30" x2="178" y2="52" stroke="${W}" stroke-width="9" stroke-linecap="round"/>
  <!-- muslos horizontales — activos coral -->
  <line x1="174" y1="52" x2="120" y2="56" stroke="${A}" stroke-width="8" stroke-linecap="round"/>
  <!-- espinillas verticales -->
  <line x1="120" y1="56" x2="116" y2="67" stroke="${A}" stroke-width="7" stroke-linecap="round"/>
  <line x1="108" y1="67" x2="124" y2="67" stroke="${A}" stroke-width="5" stroke-linecap="round"/>
  <!-- brazos apoyados -->
  <line x1="172" y1="40" x2="158" y2="52" stroke="${WD}" stroke-width="5" stroke-linecap="round"/>
  <!-- ángulo -->
  <path d="M148 56 A18 18 0 0 0 134 68" stroke="${T}" stroke-width="2" fill="none"/>
  <text x="126" y="68" fill="${T}" font-size="11" font-family="-apple-system,sans-serif" font-weight="700">30°</text>
</svg>`,

// ESTIRAMIENTO CUÁDRICEPS — de pie, pie al glúteo
strquad:`<svg viewBox="0 0 220 72" fill="none">
  <rect width="220" height="72" rx="11" fill="rgba(255,255,255,.02)"/>
  <line x1="60" y1="68" x2="160" y2="68" stroke="rgba(255,255,255,.08)" stroke-width="1.5"/>
  <!-- cabeza -->
  <circle cx="110" cy="10" r="10" fill="${W}"/>
  <!-- torso -->
  <line x1="110" y1="20" x2="110" y2="44" stroke="${W}" stroke-width="8" stroke-linecap="round"/>
  <!-- pierna de apoyo -->
  <line x1="107" y1="44" x2="102" y2="58" stroke="${W}" stroke-width="6" stroke-linecap="round"/>
  <line x1="102" y1="58" x2="100" y2="68" stroke="${W}" stroke-width="6" stroke-linecap="round"/>
  <line x1="92" y1="68" x2="108" y2="68" stroke="${W}" stroke-width="5" stroke-linecap="round"/>
  <!-- pierna activa doblada — coral -->
  <line x1="113" y1="44" x2="118" y2="56" stroke="${A}" stroke-width="7" stroke-linecap="round"/>
  <line x1="118" y1="56" x2="122" y2="42" stroke="${A}" stroke-width="7" stroke-linecap="round"/>
  <!-- mano sujetando -->
  <line x1="110" y1="32" x2="122" y2="43" stroke="${WD}" stroke-width="4" stroke-linecap="round"/>
  <circle cx="122" cy="42" r="5" fill="${WD}"/>
  <!-- flecha estiramiento -->
  <path d="M136 52 L142 58 L136 64" stroke="${T}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>`,

// CLAMSHELL — tumbada de lado, rodilla arriba
clam:`<svg viewBox="0 0 220 72" fill="none">
  <rect width="220" height="72" rx="11" fill="rgba(255,255,255,.02)"/>
  <line x1="10" y1="64" x2="210" y2="64" stroke="rgba(255,255,255,.08)" stroke-width="1.5"/>
  <!-- cabeza -->
  <circle cx="196" cy="42" r="10" fill="${W}"/>
  <!-- torso lateral -->
  <line x1="186" y1="45" x2="100" y2="50" stroke="${W}" stroke-width="9" stroke-linecap="round"/>
  <!-- pierna inferior pasiva -->
  <line x1="100" y1="50" x2="70" y2="60" stroke="${W}" stroke-width="7" stroke-linecap="round"/>
  <line x1="70" y1="60" x2="44" y2="63" stroke="${W}" stroke-width="7" stroke-linecap="round"/>
  <!-- pierna superior activa — coral, subida -->
  <line x1="104" y1="46" x2="76" y2="30" stroke="${A}" stroke-width="8" stroke-linecap="round"/>
  <line x1="76" y1="30" x2="50" y2="42" stroke="${A}" stroke-width="8" stroke-linecap="round"/>
  <!-- flecha rotación -->
  <path d="M74 48 Q66 32 78 24" stroke="${T}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M78 24 L84 32 L74 30" stroke="${T}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>`,

// PUENTE GLÚTEO — cadera arriba
bridge:`<svg viewBox="0 0 220 72" fill="none">
  <rect width="220" height="72" rx="11" fill="rgba(255,255,255,.02)"/>
  <line x1="10" y1="65" x2="210" y2="65" stroke="rgba(255,255,255,.08)" stroke-width="1.5"/>
  <!-- cabeza en suelo -->
  <circle cx="196" cy="52" r="10" fill="${W}"/>
  <!-- espalda alta en suelo -->
  <line x1="186" y1="55" x2="152" y2="57" stroke="${W}" stroke-width="8" stroke-linecap="round"/>
  <!-- torso subido diagonal -->
  <line x1="152" y1="57" x2="118" y2="36" stroke="${W}" stroke-width="8" stroke-linecap="round"/>
  <!-- cadera — activa coral -->
  <circle cx="116" cy="34" r="9" fill="rgba(232,113,90,.3)" stroke="${A}" stroke-width="2"/>
  <!-- muslos bajando -->
  <line x1="112" y1="38" x2="94" y2="56" stroke="${A}" stroke-width="7" stroke-linecap="round"/>
  <line x1="120" y1="38" x2="138" y2="54" stroke="${W}" stroke-width="7" stroke-linecap="round"/>

function loadS(){try{const d=JSON.parse(localStorage.getItem('rf3-state')||'{}');S={...S,...d};if(!S.startDate){S.startDate=today();saveS();}}catch(e){}}
function saveS(){localStorage.setItem('rf3-state',JSON.stringify(S));}
function today(){return new Date().toISOString().split('T')[0];}
function todayIdx(){const d=new Date().getDay();return d===0?6:d-1;}

function goTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  el.classList.add('active');
  ({hoy:renderHoy,semana:renderSemana,progreso:renderProgreso,ciencia:renderCiencia})[name]();
}

function renderHoy(){
  const idx=todayIdx(),day=WEEK[idx],td=today();
  if(!S.sets[td])S.sets[td]={};
  const phase=PHASES[S.phase-1],pct=getDayPct(day,td);
  let h='';
  h+=`<div class="dh">
    <div class="dh-date">${new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
    <div class="dh-name">${day.emoji} ${day.name}</div>
    <div class="dh-focus">${day.focus}</div>
    <div class="dh-pill" style="color:${day.color};border-color:${day.color};background:${day.color}1a">${day.focus}</div>
  </div>
  <div style="padding:0 18px 10px"><div style="font-size:12px;color:var(--muted)">📍 <span style="color:${phase.color};font-weight:700">Fase ${phase.num}: ${phase.name}</span> · Sem. ${phase.weeks}</div></div>`;
  if(day.restType==='full'){
    h+=`<div class="rest-card"><div class="rest-emoji">😴</div><div class="rest-title">Descanso total</div><div class="rest-text">Hoy el cuerpo asimila el trabajo de la semana. El cartílago se recupera mejor cuando le damos tregua.</div></div>
    <div class="motiv"><div class="motiv-txt">El descanso es parte del entrenamiento</div><div class="motiv-sub">La Behobia te espera 💪</div></div>`;
  } else {
    const pain=S.todayPain[td];
    h+=`<div class="pain-row"><div class="pain-lbl">Dolor hoy:</div><div class="pain-btns">
      ${[0,1,2,3,4,5].map(n=>`<button class="pb${pain===n?' sel':''}" onclick="setPain(${n},'${td}')">${n}</button>`).join('')}
    </div></div>
    <div class="prog-wrap"><div class="prog-label">Completado</div>
    <div class="prog-bar"><div class="prog-fill" id="pf" style="width:${pct}%"></div></div>
    <div class="prog-pct" id="ppct">${pct}%</div></div>
    <div class="exs" style="margin-top:10px">`;
    day.exercises.forEach(ex=>{h+=renderExCard(ex,td);});
    h+=`</div>`;
    if(pct>=100){h+=`<div class="done-banner show"><div class="done-emoji">🎉</div><div class="done-title">¡Sesión completada!</div><div class="done-sub">Un día más hacia la Behobia.</div></div>`;}
    else{h+=`<div class="motiv"><div class="motiv-txt">${motivText(pct)}</div><div class="motiv-sub">Rodilla → Golf → Behobia 🎯</div></div>`;}
  }
  document.getElementById('tab-hoy').innerHTML=h;
  updatePhaseBadge();
  setTimeout(restoreTimers,50);
}

function renderExCard(ex,td){
  const setKeys=Array.from({length:ex.sets},(_,i)=>`${ex.id}_${i}`);
  const allDone=setKeys.every(k=>S.sets[td]?.[k]);
  const dur=ex.duration;
  const durStr=dur?(dur>=60?`${Math.floor(dur/60)}:${String(dur%60).padStart(2,'0')}`:`${dur}s`):'';
  const svg=SVGS[ex.id]||'';
  const stepsHtml=(ex.steps||[]).map((s,i)=>`<div class="ec-step"><div class="ec-step-num">${i+1}</div><div>${s}</div></div>`).join('');
  let setsHtml='';
  if(ex.type==='timed'&&dur){setsHtml+=`<div class="timer-row"><button class="tbtn" id="tbtn-${ex.id}" onclick="toggleTimer('${ex.id}',${dur})">▶ Iniciar ${durStr}</button><div class="tdisp" id="tdisp-${ex.id}">${durStr}</div></div>`;}
  setsHtml+=`<div class="sets-row">${setKeys.map((k,i)=>`<button class="sb${S.sets[td]?.[k]?' done':''}" onclick="toggleSet('${k}','${td}','${ex.id}',${i})">${S.sets[td]?.[k]?'✓':`S${i+1}`}</button>`).join('')}</div>`;
  return `<div class="ec${allDone?' done-card':''}">
    <div class="ec-top"><div class="ec-icon" style="background:${ex.bg}">${ex.icon}</div>
    <div class="ec-meta"><div class="ec-name">${ex.name}</div><div class="ec-spec">${ex.sets} × ${ex.reps}</div></div></div>
    ${svg?`<div class="ec-svg-wrap">${svg}</div>`:''}
    <div class="ec-steps">${stepsHtml}</div>
    ${setsHtml}
    <div class="sci-pill"><span>🔬</span><span>${ex.sci}</span></div>
  </div>`;
}

function getDayPct(day,td){
  if(!day.exercises||!day.exercises.length)return 0;
  const total=day.exercises.reduce((s,ex)=>s+ex.sets,0);
  const done=Object.values(S.sets[td]||{}).filter(v=>v===true).length;
  return total>0?Math.min(100,Math.round(done/total*100)):0;
}
function setPain(n,td){S.todayPain[td]=n;saveS();renderHoy();}
function toggleSet(key,td,exId,setIdx){
  if(!S.sets[td])S.sets[td]={};S.sets[td][key]=!S.sets[td][key];saveS();
  const btn=document.querySelector(`[onclick="toggleSet('${key}','${td}','${exId}',${setIdx})"]`);
  if(btn){const v=S.sets[td][key];btn.classList.toggle('done',v);btn.textContent=v?'✓':`S${setIdx+1}`;
  const day=WEEK[todayIdx()];const ec=btn.closest('.ec');const ex=day.exercises.find(e=>e.id===exId);
  if(ec&&ex){const sk=Array.from({length:ex.sets},(_,i)=>`${ex.id}_${i}`);ec.classList.toggle('done-card',sk.every(k=>S.sets[td]?.[k]));}
  const pct=getDayPct(day,td);const pf=document.getElementById('pf'),ppct=document.getElementById('ppct');
  if(pf)pf.style.width=pct+'%';if(ppct)ppct.textContent=pct+'%';}
}
function motivText(pct){
  if(pct===0)return 'La constancia es el único secreto';if(pct<30)return '¡Buen comienzo! El VMO te lo agradece';
  if(pct<60)return '¡Vas a mitad! Esto mueve la aguja';if(pct<90)return 'Casi lista. El cuádriceps ya lo nota';return '¡Último ejercicio!';
}
function fmtTime(s){const m=Math.floor(s/60);return m>0?`${m}:${String(s%60).padStart(2,'0')}`:`${s}s`;}
function toggleTimer(exId,dur){
  const btn=document.getElementById('tbtn-'+exId),disp=document.getElementById('tdisp-'+exId);
  if(timers[exId]?.running){clearInterval(timers[exId].iv);timers[exId].running=false;if(btn)btn.textContent='▶ Continuar';return;}
  const rem=timers[exId]?.rem??dur;timers[exId]={running:true,rem,iv:null,done:false};
  if(btn)btn.textContent='⏸ Pausar';if(disp)disp.textContent=fmtTime(rem);
  timers[exId].iv=setInterval(()=>{timers[exId].rem--;const r=timers[exId].rem;
  const d=document.getElementById('tdisp-'+exId);if(d)d.textContent=fmtTime(Math.max(0,r));
  if(r<=0){clearInterval(timers[exId].iv);timers[exId]={running:false,rem:0,done:true};
  if(d)d.textContent='✓ Listo';const b=document.getElementById('tbtn-'+exId);if(b)b.textContent='↺ Repetir';
  if(navigator.vibrate)navigator.vibrate([200,100,200]);}},1000);
}
function restoreTimers(){
  Object.entries(timers).forEach(([exId,ts])=>{
  const d=document.getElementById('tdisp-'+exId),b=document.getElementById('tbtn-'+exId);if(!d)return;
  if(ts.done){d.textContent='✓ Listo';if(b)b.textContent='↺ Repetir';}
  else if(ts.running){d.textContent=fmtTime(ts.rem);if(b)b.textContent='⏸ Pausar';}
  else if(ts.rem>0){d.textContent=fmtTime(ts.rem);if(b)b.textContent='▶ Continuar';}});
}

function renderSemana(){
  const tidx=todayIdx();let h=`<div class="sec"><div class="sec-title">Plan semanal completo</div></div><div style="padding:0 18px">`;
  WEEK.forEach((day,i)=>{const isToday=i===tidx;
  h+=`<div class="wdc${isToday?' today-day':''}">
    <div class="wdh${isToday?' open':''}" onclick="toggleWD(this)">
      <div class="wdl"><div class="wdcirc" style="background:${day.color}22;color:${day.color}${isToday?`;border:2px solid ${day.color}`:''}">
      ${day.short}</div><div class="wdinfo"><div class="dname">${day.name}${isToday?`<span class="today-badge">HOY</span>`:''}</div>
      <div class="dfoc">${day.emoji} ${day.focus}</div></div></div><div class="chev">▼</div></div>
    <div class="wdbody${isToday?' open':''}">
      ${day.isRest&&day.restType==='full'?`<div style="color:var(--muted);font-size:13px;text-align:center;padding:8px 0">😴 Descanso total</div>`
      :day.exercises.map(ex=>`<div class="wei"><div style="font-size:16px;width:22px;text-align:center">${ex.icon}</div><div class="wei-name">${ex.name}</div><div class="wei-spec">${ex.sets}×${ex.reps.replace(' repeticiones','rep').replace(' segundos','s').replace(' minutos','min')}</div></div>`).join('')}
    </div></div>`;});
  h+=`</div>`;document.getElementById('tab-semana').innerHTML=h;
}
function toggleWD(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}

function renderProgreso(){
  const start=S.startDate?new Date(S.startDate):new Date();
  const weeks=Math.floor((new Date()-start)/864e5/7)+1;
  const sessions=Object.values(S.sets).filter(d=>Object.values(d).some(v=>v===true)).length;
  let h=`<div class="sec"><div class="sec-title">Tu progreso</div></div>
  <div class="stats-row">
    <div class="stat"><div class="stat-val" style="color:var(--accent)">${weeks}</div><div class="stat-lbl">Semana</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--teal)">${sessions}</div><div class="stat-lbl">Sesiones</div></div>
    <div class="stat"><div class="stat-val">🎯</div><div class="stat-lbl">Behobia</div></div>
  </div>
  <div class="sec" style="margin-top:18px"><div class="sec-title">Fases del programa</div></div>
  <div class="phases-grid">`;
  PHASES.forEach((ph,i)=>{const n=i+1,isA=n===S.phase,isD=n<S.phase;
  h+=`<div class="ph-card${isA?' ph-active':''}${isD?' ph-done':''}">
    <div class="ph-num" style="color:${ph.color}">FASE ${ph.num}</div>
    <div class="ph-weeks" style="color:${isA?ph.color:'var(--text)'}">${ph.weeks}</div>
    <div class="ph-desc">${ph.name}</div>
    ${isA?`<div class="ph-dot" style="color:${ph.color}">● Activa</div>`:''}
    ${isD?`<div class="ph-dot" style="color:var(--muted)">✓ Lista</div>`:''}
  </div>`;});
  h+=`</div>`;
  if(S.phase<3){h+=`<div class="advance-wrap"><div class="advance-hint">Avanza cuando lleves 3 semanas sin dolor (≤1/5)</div><button class="advance-btn" onclick="advancePhase()">Avanzar a Fase ${S.phase+1} →</button></div>`;}
  const painEntries=Object.entries(S.todayPain).filter(([,v])=>v!==undefined).sort().slice(-10);
  if(painEntries.length>0){const pc=['#3dd0cc','#3dd0cc','#6ee7b7','#f5c542','#fb923c','#e8715a'];
  h+=`<div class="sec"><div class="sec-title">Historial de dolor</div></div>
  <div style="padding:0 18px"><div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px">
  ${painEntries.map(([date,pain])=>`<div class="ph-row"><div class="ph-date">${new Date(date+'T12:00').toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'})}</div>
  <div class="ph-bar-wrap"><div class="ph-bar" style="width:${pain*18+8}px;background:${pc[pain]||'#e8715a'}"></div>
  <div class="ph-score" style="color:${pc[pain]||'#e8715a'}">${pain}/5</div></div></div>`).join('')}
  </div></div>`;}
  h+=`<div style="padding:14px 18px"><div class="motiv"><div class="motiv-txt">🎯 Objetivo: Behobia 2026</div><div class="motiv-sub">La condropatía grado II mejora con trabajo consistente.</div></div></div>`;
  document.getElementById('tab-progreso').innerHTML=h;
}
function advancePhase(){if(S.phase<3){S.phase++;saveS();renderProgreso();updatePhaseBadge();}}

function renderCiencia(){
  const cards=[
    {icon:'🦵',title:'¿Qué es la condropatía grado II?',body:`El cartílago detrás de tu rótula tiene daño <strong>moderado</strong>: no hay rotura, pero la superficie no es lisa y genera fricción.<br><br>El dolor viene de la inflamación, no del cartílago en sí. <strong>Grado II puede mejorar mucho</strong> con trabajo específico. La clave es reducir la fricción mejorando la mecánica de la rótula.`},
    {icon:'⚡',title:'Por qué el VMO es la clave',body:`El <strong>Vasto Medial Oblicuo (VMO)</strong> es la porción interna del cuádriceps. Centra la rótula en su surco.<br><br>Si está débil, la rótula se desplaza y roza el cartílago. Fortalecer el VMO = centrar la rótula = menos fricción = menos dolor.`},
    {icon:'🏗',title:'Los 3 ángulos que necesitas saber',body:`• <strong>0–30°:</strong> Presión mínima. La zona segura al inicio.<br>• <strong>30–60°:</strong> Presión moderada. Con cuidado.<br>• <strong>60–90°+:</strong> La presión se multiplica ×4. Evitar.<br><br>Por eso el wall sit va a 30-45° y la mini sentadilla empieza en 30°.`},
    {icon:'🍑',title:'Por qué trabajamos la cadera',body:`El <strong>glúteo medio débil</strong> crea valgo de rodilla (hacia dentro), que desequilibra la rótula.<br><br>Añadir trabajo de cadera reduce el dolor rotuliano un <strong>40% más</strong> que trabajar solo el cuádriceps.`},
    {icon:'📈',title:'Señales de que vas mejorando',body:`✅ Menos dolor al bajar escaleras<br>✅ Más tiempo en wall sit sin molestias<br>✅ Menos rigidez matutina<br>✅ La rodilla cruje menos<br>✅ Más distancia caminando<br><br><strong>Para un ejercicio</strong> si el dolor supera 3/5.`},
    {icon:'⛳',title:'El golf y la rodilla ahora',body:`<strong>Puedes seguir jugando</strong> si el dolor es ≤2/5. Usa carrito. Evita lies en cuesta abajo que fuerzan la rodilla. El swing raramente agrava la condropatía.`},
    {icon:'🏃',title:'La Behobia como objetivo',body:`Alcanzable con condropatía grado II si:<br>1. Reduces el dolor a 0-1 (8–12 semanas de programa)<br>2. Introduces carrera gradual en fase 3<br>3. El cuádriceps aguanta la rampa de Hernani (200m en 4km)<br><br>Ese cuádriceps fuerte es tu seguro de vida en las cuestas.`},
    {icon:'⚠',title:'Lo que hay que evitar de momento',warn:true,body:`❌ Sentadillas profundas (>60°)<br>❌ Correr cuesta abajo<br>❌ Pedalear con mucha resistencia<br>❌ Arrodillarse mucho tiempo<br>❌ Running si duele más de 3/5<br><br>No es para siempre. En 8–12 semanas vas reintroduciendo todo.`},
  ];
  let h=`<div class="sec"><div class="sec-title">Por qué funciona este programa</div></div><div style="padding:0 18px">`;
  cards.forEach(c=>{h+=`<div class="sc-card${c.warn?' warn-card':''}"><div class="sc-title">${c.icon} ${c.title}</div><div class="sc-body">${c.body}</div></div>`;});
  h+=`</div><div style="height:12px"></div>`;
  document.getElementById('tab-ciencia').innerHTML=h;
}

function updatePhaseBadge(){
  const ph=PHASES[S.phase-1],b=document.getElementById('phaseBadge');
  if(!b)return;b.textContent=`Fase ${ph.num} · ${ph.name}`;b.style.background=ph.color+'25';b.style.color=ph.color;
}

loadS();renderHoy();
</script>
