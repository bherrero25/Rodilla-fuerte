<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rodilla">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0e12">
<title>Rodilla Fuerte</title>
<style>
:root{
  --bg:#0d0e12;--card:#161720;--lifted:#1e1f2b;--border:#252635;
  --accent:#e8715a;--adim:rgba(232,113,90,.15);
  --teal:#3dd0cc;--tdim:rgba(61,208,204,.1);
  --text:#f0eee8;--muted:#7a7b8e;--dim:#3d3e52;
  --p1:#3dd0cc;--p2:#f4a261;--p3:#a78bfa;
  --sbt:env(safe-area-inset-bottom,0px);--stt:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;min-height:100vh;overscroll-behavior:none}
.hdr{position:fixed;top:0;left:0;right:0;z-index:99;background:rgba(13,14,18,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:calc(var(--stt) + 14px) 18px 12px}
.hdr-inner{display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-size:20px;font-weight:800;letter-spacing:-.5px}
.hdr-logo span{color:var(--accent)}
.phase-tag{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;transition:all .3s}
.main{padding-top:calc(var(--stt) + 68px);padding-bottom:calc(var(--sbt) + 72px)}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(14,15,20,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);padding-bottom:var(--sbt)}
.ni{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;cursor:pointer;color:var(--dim);transition:color .2s;gap:3px;user-select:none}
.ni.active{color:var(--accent)}
.ni svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ni-lbl{font-size:10px;font-weight:600;letter-spacing:.3px}
.tab{display:none}.tab.active{display:block}
.dh{padding:24px 18px 12px}
.dh-date{font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.dh-name{font-size:30px;font-weight:900;letter-spacing:-1.2px;line-height:1}
.dh-focus{font-size:14px;color:var(--muted);margin-top:5px}
.dh-pill{display:inline-block;margin-top:10px;padding:4px 13px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid}
.prog-wrap{margin:0 18px 4px;display:flex;align-items:center;gap:12px}
.prog-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
.prog-bar{flex:1;height:5px;background:var(--lifted);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:10px;background:var(--accent);transition:width .4s ease}
.prog-pct{font-size:12px;font-weight:800;color:var(--accent);min-width:36px;text-align:right}
.pain-row{padding:0 18px 14px;display:flex;align-items:center;gap:10px}
.pain-lbl{font-size:12px;color:var(--muted);white-space:nowrap}
.pain-btns{display:flex;gap:5px}
.pb{width:34px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.pb.sel{background:var(--adim);border-color:var(--accent);color:var(--accent)}
.exs{padding:0 18px}
.ec{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px;margin-bottom:11px;transition:opacity .3s}
.ec.done-card{opacity:.6}
.ec-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px}
.ec-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.ec-meta{flex:1;min-width:0}
.ec-name{font-size:15px;font-weight:800;margin-bottom:3px;letter-spacing:-.3px}
.ec-spec{font-size:12px;color:var(--muted);font-weight:500}
.ec-svg-wrap{border-radius:12px;overflow:hidden;background:rgba(255,255,255,.025);border:1px solid var(--border);margin-bottom:11px;line-height:0}
.ec-svg-wrap svg{width:100%;height:auto;display:block}
.ec-steps{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:11px}
.ec-steps strong{color:var(--text);font-weight:600}
.ec-step{display:flex;gap:8px;margin-bottom:4px}
.ec-step-num{min-width:18px;height:18px;border-radius:50%;background:var(--lifted);border:1px solid var(--border);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;margin-top:1px}
.sets-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.sb{flex:1;min-width:42px;max-width:72px;height:35px;border-radius:10px;border:1.5px solid var(--border);background:var(--lifted);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.sb.done{background:var(--accent);border-color:var(--accent);color:#fff}
.sci-pill{display:flex;gap:8px;padding:8px 10px;background:var(--tdim);border:1px solid rgba(61,208,204,.2);border-radius:9px;font-size:12px;color:var(--teal);line-height:1.45}
.timer-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tbtn{flex:1;height:42px;border-radius:12px;border:1.5px solid var(--accent);background:transparent;color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;transition:background .2s,color .2s}
.tbtn:active{background:var(--accent);color:#fff}
.tdisp{font-size:22px;font-weight:900;color:var(--accent);min-width:58px;text-align:center;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.rest-card{margin:20px 18px;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:32px 20px;text-align:center}
.rest-emoji{font-size:52px;margin-bottom:14px;line-height:1}
.rest-title{font-size:24px;font-weight:900;margin-bottom:8px;letter-spacing:-.5px}
.rest-text{font-size:14px;color:var(--muted);line-height:1.6;max-width:280px;margin:0 auto}
.motiv{margin:14px 18px;padding:16px;background:linear-gradient(135deg,var(--adim),rgba(61,208,204,.06));border:1px solid rgba(232,113,90,.2);border-radius:16px;text-align:center}
.motiv-txt{font-size:15px;font-weight:700;line-height:1.4}
.motiv-sub{font-size:12px;color:var(--muted);margin-top:4px}
.done-banner{display:none;margin:14px 18px;padding:22px 20px;background:rgba(232,113,90,.1);border:1px solid rgba(232,113,90,.3);border-radius:16px;text-align:center}
.done-banner.show{display:block}
.done-emoji{font-size:36px;margin-bottom:8px}
.done-title{font-size:17px;font-weight:800;margin-bottom:5px}
.done-sub{font-size:13px;color:var(--muted)}
.sec{padding:20px 18px 0}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:12px}
.wdc{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden}
.wdc.today-day{border-color:var(--accent)}
.wdh{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;cursor:pointer;user-select:none}
.wdl{display:flex;align-items:center;gap:11px}
.wdcirc{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.wdinfo .dname{font-size:15px;font-weight:700}
.wdinfo .dfoc{font-size:12px;color:var(--muted)}
.chev{color:var(--dim);font-size:12px;transition:transform .2s}
.wdh.open .chev{transform:rotate(180deg)}
.wdbody{display:none;padding:0 15px 13px}
.wdbody.open{display:block}
.wei{display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid var(--border);font-size:13px}
.wei:first-child{border-top:none}
.wei-name{flex:1;font-weight:500}
.wei-spec{color:var(--muted);font-size:12px;font-weight:600}
.phases-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:0 18px}
.ph-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 11px;text-align:center}
.ph-card.ph-active{border-color:var(--accent)}
.ph-card.ph-done{opacity:.45}
.ph-num{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.ph-weeks{font-size:18px;font-weight:900;margin-bottom:3px}
.ph-desc{font-size:11px;color:var(--muted);line-height:1.3}
.ph-dot{font-size:10px;margin-top:5px;font-weight:700}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:0 18px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px 10px;text-align:center}
.stat-val{font-size:26px;font-weight:900;line-height:1;margin-bottom:4px;letter-spacing:-.5px}
.stat-lbl{font-size:11px;color:var(--muted);font-weight:500}
.advance-wrap{padding:14px 18px}
.advance-hint{font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px;line-height:1.5}
.advance-btn{width:100%;height:48px;border-radius:14px;background:var(--accent);border:none;color:#fff;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:-.3px}
.ph-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.ph-row:last-child{border-bottom:none}
.ph-date{font-size:12px;color:var(--muted)}
.ph-bar-wrap{display:flex;align-items:center;gap:8px}
.ph-bar{height:6px;border-radius:3px;min-width:8px}
.ph-score{font-size:13px;font-weight:800;min-width:28px;text-align:right}
.sc-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px;margin-bottom:10px}
.sc-title{font-size:15px;font-weight:800;margin-bottom:8px;letter-spacing:-.3px;display:flex;align-items:center;gap:7px}
.sc-body{font-size:13px;color:var(--muted);line-height:1.65}
.sc-body strong{color:var(--teal);font-weight:700}
.warn-card{border-color:rgba(232,113,90,.25)}
.today-badge{font-size:9px;color:var(--accent);background:var(--adim);padding:2px 7px;border-radius:10px;font-weight:700;margin-left:5px;vertical-align:middle}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ec{animation:slideUp .3s ease both}
.ec:nth-child(1){animation-delay:.04s}.ec:nth-child(2){animation-delay:.09s}.ec:nth-child(3){animation-delay:.14s}.ec:nth-child(4){animation-delay:.19s}
</style>
</head>
<body>

  <div class="hdr-inner">
    <div class="hdr-logo">Rodilla<span>.</span></div>
    <div class="phase-tag" id="phaseBadge">Fase 1</div>
  </div>

<main class="main">
  <div class="tab active" id="tab-hoy"></div>
  <div class="tab" id="tab-semana"></div>
  <div class="tab" id="tab-progreso"></div>
  <div class="tab" id="tab-ciencia"></div>
</main>
<nav class="nav">
  <div class="ni active" onclick="goTab('hoy',this)">

  <div class="ni" onclick="goTab('semana',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="ni-lbl">Semana</span>
  </div>
  <div class="ni" onclick="goTab('progreso',this)">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span class="ni-lbl">Progreso</span>

</nav>

let S={phase:1,startDate:null,sets:{},todayPain:{}};
let timers={};

function loadS(){try{const d=JSON.parse(localStorage.getItem('rf2-state')||'{}');S={...S,...d};if(!S.startDate){S.startDate=today();saveS();}}catch(e){}}
function saveS(){localStorage.setItem('rf2-state',JSON.stringify(S));}
function today(){return new Date().toISOString().split('T')[0];}
function todayIdx(){const d=new Date().getDay();return d===0?6:d-1;}

function goTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  el.classList.add('active');
  ({hoy:renderHoy,semana:renderSemana,progreso:renderProgreso,ciencia:renderCiencia})[name]();
}

function renderHoy(){
  const idx=todayIdx(),day=WEEK[idx],td=today();

  let h='';
  h+=`<div class="dh">
    <div class="dh-date">${new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
    <div class="dh-name">${day.emoji} ${day.name}</div>
    <div class="dh-focus">${day.focus}</div>
    <div class="dh-pill" style="color:${day.color};border-color:${day.color};background:${day.color}1a">${day.focus}</div>
  </div>
  <div style="padding:0 18px 10px"><div style="font-size:12px;color:var(--muted)">📍 <span style="color:${phase.color};font-weight:700">Fase ${phase.num}: ${phase.name}</span> · Sem. ${phase.weeks}</div></div>`;

  if(day.restType==='full'){
    h+=`<div class="rest-card"><div class="rest-emoji">😴</div><div class="rest-title">Descanso total</div>
    <div class="rest-text">Hoy el cuerpo asimila el trabajo de la semana. El cartílago se recupera mejor cuando le damos tregua. Descansa sin culpa.</div></div>
    <div class="motiv"><div class="motiv-txt">El descanso es parte del entrenamiento</div><div class="motiv-sub">La Behobia te espera 💪</div></div>`;
  } else {
    const pain=S.todayPain[td];
    h+=`<div class="pain-row"><div class="pain-lbl">Dolor hoy:</div><div class="pain-btns">
      ${[0,1,2,3,4,5].map(n=>`<button class="pb${pain===n?' sel':''}" onclick="setPain(${n},'${td}')">${n}</button>`).join('')}
    </div></div>
    <div class="prog-wrap"><div class="prog-label">Completado</div>
    <div class="prog-bar"><div class="prog-fill" id="pf" style="width:${pct}%"></div></div>
    <div class="prog-pct" id="ppct">${pct}%</div></div>
    <div class="exs" style="margin-top:10px">`;
    day.exercises.forEach(ex=>{h+=renderExCard(ex,td);});
    h+=`</div>`;
    if(pct>=100){h+=`<div class="done-banner show"><div class="done-emoji">🎉</div><div class="done-title">¡Sesión completada!</div><div class="done-sub">Un día más hacia la Behobia. La rodilla lo va a notar.</div></div>`;}
    else{h+=`<div class="motiv"><div class="motiv-txt">${motivText(pct)}</div><div class="motiv-sub">Rodilla → Golf → Behobia 🎯</div></div>`;}
  }
  document.getElementById('tab-hoy').innerHTML=h;
  updatePhaseBadge();
  setTimeout(restoreTimers,50);
}

function renderExCard(ex,td){
  const setKeys=Array.from({length:ex.sets},(_,i)=>`${ex.id}_${i}`);
  const allDone=setKeys.every(k=>S.sets[td]?.[k]);
  const dur=ex.duration;
  const durStr=dur?(dur>=60?`${Math.floor(dur/60)}:${String(dur%60).padStart(2,'0')}`:`${dur}s`):'';
  const svg=SVGS[ex.id]||'';
  const stepsHtml=(ex.steps||[]).map((s,i)=>`<div class="ec-step"><div class="ec-step-num">${i+1}</div><div>${s}</div></div>`).join('');
  let setsHtml='';
  if(ex.type==='timed'&&dur){
    setsHtml+=`<div class="timer-row">
      <button class="tbtn" id="tbtn-${ex.id}" onclick="toggleTimer('${ex.id}',${dur})">▶ Iniciar ${durStr}</button>
      <div class="tdisp" id="tdisp-${ex.id}">${durStr}</div>
    </div>`;
  }
  setsHtml+=`<div class="sets-row">${setKeys.map((k,i)=>`<button class="sb${S.sets[td]?.[k]?' done':''}" onclick="toggleSet('${k}','${td}','${ex.id}',${i})">${S.sets[td]?.[k]?'✓':`S${i+1}`}</button>`).join('')}</div>`;
  return `<div class="ec${allDone?' done-card':''}">
    <div class="ec-top">
      <div class="ec-icon" style="background:${ex.bg}">${ex.icon}</div>
      <div class="ec-meta"><div class="ec-name">${ex.name}</div><div class="ec-spec">${ex.sets} × ${ex.reps}</div></div>
    </div>
    ${svg?`<div class="ec-svg-wrap">${svg}</div>`:''}
    <div class="ec-steps">${stepsHtml}</div>
    ${setsHtml}
    <div class="sci-pill"><span>🔬</span><span>${ex.sci}</span></div>
  </div>`;
}

function getDayPct(day,td){
  if(!day.exercises||!day.exercises.length)return 0;
  const total=day.exercises.reduce((s,ex)=>s+ex.sets,0);
  const done=Object.values(S.sets[td]||{}).filter(v=>v===true).length;
  return total>0?Math.min(100,Math.round(done/total*100)):0;
}
function setPain(n,td){S.todayPain[td]=n;saveS();renderHoy();}
function toggleSet(key,td,exId,setIdx){
  if(!S.sets[td])S.sets[td]={};
  S.sets[td][key]=!S.sets[td][key];saveS();
  const btn=document.querySelector(`[onclick="toggleSet('${key}','${td}','${exId}',${setIdx})"]`);
  if(btn){
    const v=S.sets[td][key];
    btn.classList.toggle('done',v);btn.textContent=v?'✓':`S${setIdx+1}`;
    const day=WEEK[todayIdx()];
    const ec=btn.closest('.ec');
    const ex=day.exercises.find(e=>e.id===exId);
    if(ec&&ex){const sk=Array.from({length:ex.sets},(_,i)=>`${ex.id}_${i}`);ec.classList.toggle('done-card',sk.every(k=>S.sets[td]?.[k]));}
    const pct=getDayPct(day,td);
    const pf=document.getElementById('pf'),ppct=document.getElementById('ppct');
    if(pf)pf.style.width=pct+'%';if(ppct)ppct.textContent=pct+'%';
  }
}
function motivText(pct){
  if(pct===0)return 'La constancia es el único secreto';
  if(pct<30)return '¡Buen comienzo! El VMO te lo agradece';
  if(pct<60)return '¡Vas a mitad! Esto es lo que mueve la aguja';
  if(pct<90)return 'Casi lista. El cuádriceps ya lo nota';
  return '¡Último ejercicio! Dalo todo';
}

function fmtTime(s){const m=Math.floor(s/60);return m>0?`${m}:${String(s%60).padStart(2,'0')}`:`${s}s`;}
function toggleTimer(exId,dur){
  const btn=document.getElementById('tbtn-'+exId),disp=document.getElementById('tdisp-'+exId);
  if(timers[exId]?.running){clearInterval(timers[exId].iv);timers[exId].running=false;if(btn)btn.textContent='▶ Continuar';return;}
  const rem=timers[exId]?.rem??dur;
  timers[exId]={running:true,rem,iv:null,done:false};
  if(btn)btn.textContent='⏸ Pausar';
  if(disp)disp.textContent=fmtTime(rem);
  timers[exId].iv=setInterval(()=>{
    timers[exId].rem--;const r=timers[exId].rem;
    const d=document.getElementById('tdisp-'+exId);if(d)d.textContent=fmtTime(Math.max(0,r));
    if(r<=0){clearInterval(timers[exId].iv);timers[exId]={running:false,rem:0,done:true};
    if(d)d.textContent='✓ Listo';const b=document.getElementById('tbtn-'+exId);
    if(b)b.textContent='↺ Repetir';if(navigator.vibrate)navigator.vibrate([200,100,200]);}
  },1000);
}
function restoreTimers(){
  Object.entries(timers).forEach(([exId,ts])=>{
    const d=document.getElementById('tdisp-'+exId),b=document.getElementById('tbtn-'+exId);
    if(!d)return;
    if(ts.done){d.textContent='✓ Listo';if(b)b.textContent='↺ Repetir';}
    else if(ts.running){d.textContent=fmtTime(ts.rem);if(b)b.textContent='⏸ Pausar';}
    else if(ts.rem>0){d.textContent=fmtTime(ts.rem);if(b)b.textContent='▶ Continuar';}
  });
}

function updatePhaseBadge(){
  const ph=PHASES[S.phase-1],b=document.getElementById('phaseBadge');
  if(!b)return;
  b.textContent=`Fase ${ph.num} · ${ph.name}`;
  b.style.background=ph.color+'25';b.style.color=ph.color;
}

loadS();renderHoy();
</script>
