<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rodilla">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0e12">
<title>Rodilla Fuerte</title>
<style>
:root{
  --bg:#0d0e12;--card:#161720;--lifted:#1e1f2b;--border:#252635;
  --accent:#e8715a;--adim:rgba(232,113,90,.15);
  --teal:#3dd0cc;--tdim:rgba(61,208,204,.1);
  --text:#f0eee8;--muted:#7a7b8e;--dim:#3d3e52;
  --p1:#3dd0cc;--p2:#f4a261;--p3:#a78bfa;
  --sbt:env(safe-area-inset-bottom,0px);--stt:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;min-height:100vh;overscroll-behavior:none}
.hdr{position:fixed;top:0;left:0;right:0;z-index:99;background:rgba(13,14,18,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:calc(var(--stt) + 14px) 18px 12px}
.hdr-inner{display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-size:20px;font-weight:800;letter-spacing:-.5px}
.hdr-logo span{color:var(--accent)}
.phase-tag{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;transition:all .3s}
.main{padding-top:calc(var(--stt) + 68px);padding-bottom:calc(var(--sbt) + 72px)}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(14,15,20,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(6,1fr);padding-bottom:var(--sbt)}
.ni svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ni{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 0 7px;cursor:pointer;color:var(--dim);transition:color .2s;gap:3px;user-select:none}
.ni.active{color:var(--accent)}
.ni svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ni-lbl{font-size:9px;font-weight:600;letter-spacing:.2px}
.tab{display:none}.tab.active{display:block}
.dh{padding:24px 18px 12px}
.dh-date{font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.dh-name{font-size:30px;font-weight:900;letter-spacing:-1.2px;line-height:1}
.dh-focus{font-size:14px;color:var(--muted);margin-top:5px}
.dh-pill{display:inline-block;margin-top:10px;padding:4px 13px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid}
.prog-wrap{margin:0 18px 4px;display:flex;align-items:center;gap:12px}
.prog-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
.prog-bar{flex:1;height:5px;background:var(--lifted);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:10px;background:var(--accent);transition:width .4s ease}
.prog-pct{font-size:12px;font-weight:800;color:var(--accent);min-width:36px;text-align:right}
.pain-row{padding:0 18px 14px;display:flex;align-items:center;gap:10px}
.pain-lbl{font-size:12px;color:var(--muted);white-space:nowrap}
.pain-btns{display:flex;gap:5px}
.pb{width:34px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.pb.sel{background:var(--adim);border-color:var(--accent);color:var(--accent)}
.exs{padding:0 18px}
.ec{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px;margin-bottom:11px;transition:opacity .3s}
.ec.done-card{opacity:.6}
.ec-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px}
.ec-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.ec-meta{flex:1;min-width:0}
.ec-name{font-size:15px;font-weight:800;margin-bottom:3px;letter-spacing:-.3px}
.ec-spec{font-size:12px;color:var(--muted);font-weight:500}
/* SVG más pequeño y bonito */
.ec-svg-wrap{border-radius:12px;overflow:hidden;background:rgba(255,255,255,.02);border:1px solid var(--border);margin-bottom:11px;display:flex;align-items:center;justify-content:center;height:72px}
.ec-svg-wrap svg{width:100%;height:72px}
.ec-steps{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:11px}
.ec-step{display:flex;gap:8px;margin-bottom:4px}
.ec-step-num{min-width:18px;height:18px;border-radius:50%;background:var(--lifted);border:1px solid var(--border);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;margin-top:1px}
.sets-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.sb{flex:1;min-width:80px;height:54px;border-radius:12px;border:1.5px solid var(--border);background:var(--lifted);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.sb .sb-top{font-size:12px;font-weight:700}
.sb .sb-bot{font-size:10px;font-weight:500;opacity:.7}
.sb.done{background:var(--accent);border-color:var(--accent);color:#fff}
.sb.done .sb-bot{opacity:.8}
.sets-hint{font-size:11px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.sci-pill{display:flex;gap:8px;padding:8px 10px;background:var(--tdim);border:1px solid rgba(61,208,204,.2);border-radius:9px;font-size:12px;color:var(--teal);line-height:1.45}
.vid-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:44px;border-radius:12px;background:rgba(255,30,30,.13);border:1.5px solid rgba(255,60,60,.35);color:#ff6060;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;margin-bottom:11px;transition:background .2s;letter-spacing:-.2px}
.vid-btn:active{background:rgba(255,30,30,.25)}
.timer-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tbtn{flex:1;height:50px;border-radius:12px;border:1.5px solid var(--accent);background:rgba(232,113,90,.08);color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,color .2s}
.tbtn:active,.tbtn.running{background:var(--accent);color:#fff}
.tdisp{font-size:28px;font-weight:900;color:var(--accent);min-width:70px;text-align:center;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
.rest-card{margin:20px 18px;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:32px 20px;text-align:center}
.rest-emoji{font-size:52px;margin-bottom:14px;line-height:1}
.rest-title{font-size:24px;font-weight:900;margin-bottom:8px;letter-spacing:-.5px}
.rest-text{font-size:14px;color:var(--muted);line-height:1.6;max-width:280px;margin:0 auto}
.motiv{margin:14px 18px;padding:16px;background:linear-gradient(135deg,var(--adim),rgba(61,208,204,.06));border:1px solid rgba(232,113,90,.2);border-radius:16px;text-align:center}
.motiv-txt{font-size:15px;font-weight:700;line-height:1.4}
.motiv-sub{font-size:12px;color:var(--muted);margin-top:4px}
.done-banner{display:none;margin:14px 18px;padding:22px 20px;background:rgba(232,113,90,.1);border:1px solid rgba(232,113,90,.3);border-radius:16px;text-align:center}
.done-banner.show{display:block}
.done-emoji{font-size:36px;margin-bottom:8px}
.done-title{font-size:17px;font-weight:800;margin-bottom:5px}
.done-sub{font-size:13px;color:var(--muted)}
.sec{padding:20px 18px 0}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:12px}
.wdc{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden}
.wdc.today-day{border-color:var(--accent)}
.wdh{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;cursor:pointer;user-select:none}
.wdl{display:flex;align-items:center;gap:11px}
.wdcirc{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.wdinfo .dname{font-size:15px;font-weight:700}
.wdinfo .dfoc{font-size:12px;color:var(--muted)}
.chev{color:var(--dim);font-size:12px;transition:transform .2s}
.wdh.open .chev{transform:rotate(180deg)}
.wdbody{display:none;padding:0 15px 13px}
.wdbody.open{display:block}
.wei{display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid var(--border);font-size:13px}
.wei:first-child{border-top:none}
.wei-name{flex:1;font-weight:500}
.wei-spec{color:var(--muted);font-size:12px;font-weight:600}
.phases-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:0 18px}
.ph-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 11px;text-align:center}
.ph-card.ph-active{border-color:var(--accent)}
.ph-card.ph-done{opacity:.45}
.ph-num{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.ph-weeks{font-size:18px;font-weight:900;margin-bottom:3px}
.ph-desc{font-size:11px;color:var(--muted);line-height:1.3}
.ph-dot{font-size:10px;margin-top:5px;font-weight:700}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:0 18px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px 10px;text-align:center}
.stat-val{font-size:26px;font-weight:900;line-height:1;margin-bottom:4px;letter-spacing:-.5px}
.stat-lbl{font-size:11px;color:var(--muted);font-weight:500}
.advance-wrap{padding:14px 18px}
.advance-hint{font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px;line-height:1.5}
.advance-btn{width:100%;height:48px;border-radius:14px;background:var(--accent);border:none;color:#fff;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:-.3px}
.ph-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.ph-row:last-child{border-bottom:none}
.ph-date{font-size:12px;color:var(--muted)}
.ph-bar-wrap{display:flex;align-items:center;gap:8px}
.ph-bar{height:6px;border-radius:3px;min-width:8px}
.ph-score{font-size:13px;font-weight:800;min-width:28px;text-align:right}
.sc-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px;margin-bottom:10px}
.sc-title{font-size:15px;font-weight:800;margin-bottom:8px;letter-spacing:-.3px;display:flex;align-items:center;gap:7px}
.sc-body{font-size:13px;color:var(--muted);line-height:1.65}
.sc-body strong{color:var(--teal);font-weight:700}
.warn-card{border-color:rgba(232,113,90,.25)}
.today-badge{font-size:9px;color:var(--accent);background:var(--adim);padding:2px 7px;border-radius:10px;font-weight:700;margin-left:5px;vertical-align:middle}
/* ── COMIDA ── */
.kcal-ring-wrap{display:flex;align-items:center;gap:16px;padding:18px;background:var(--card);border:1px solid var(--border);border-radius:18px;margin:0 18px 14px}
.kcal-big{font-size:34px;font-weight:900;letter-spacing:-1.5px;line-height:1}
.kcal-sub{font-size:13px;color:var(--muted);margin-top:3px}
.macro-row{display:flex;gap:8px;padding:0 18px 14px}
.macro{flex:1;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:11px 8px;text-align:center}
.macro-val{font-size:17px;font-weight:800;line-height:1}
.macro-lbl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600}
.search-box{margin:0 18px 12px;position:relative}
.search-box input{width:100%;height:46px;border-radius:13px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:15px;padding:0 14px;outline:none}
.search-box input:focus{border-color:var(--accent)}
.food-res{margin:0 18px;max-height:none}
.food-item{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:7px;cursor:pointer;transition:border-color .2s}
.food-item:active{border-color:var(--accent)}
.food-info{flex:1;min-width:0}
.food-name{font-size:14px;font-weight:600}
.food-meta{font-size:11px;color:var(--muted);margin-top:1px}
.food-add{width:30px;height:30px;border-radius:9px;background:var(--adim);border:1px solid var(--accent);color:var(--accent);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.meal-sec{padding:0 18px;margin-bottom:6px}
.meal-head{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;color:var(--muted);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.5px}
.logged{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:6px}
.logged-del{color:var(--dim);font-size:18px;cursor:pointer;padding:0 4px}
.meal-tab{flex:1;padding:9px 4px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.meal-tab.active{background:var(--adim);border-color:var(--accent);color:var(--accent)}
.meal-block{margin:0 18px 8px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 13px}
.meal-block-head{display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:800;margin-bottom:8px;letter-spacing:-.2px}
.meal-block-kcal{font-size:13px;color:var(--accent);font-weight:800}
.meal-empty{text-align:center;color:var(--muted);font-size:13px;padding:8px;border:1px dashed var(--border);border-radius:10px;cursor:pointer}
.meal-empty:active{border-color:var(--accent);color:var(--accent)}
.report-card{margin:0 18px 14px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px}
.report-title{font-size:14px;font-weight:800;margin-bottom:14px;letter-spacing:-.3px}
.macro-bar-wrap{margin-bottom:14px}
.macro-bar{display:flex;height:14px;border-radius:7px;overflow:hidden;background:var(--lifted)}
.macro-bar>div{height:100%;transition:width .4s ease}
.rg-item{display:grid;grid-template-columns:14px 1fr auto auto;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.rg-dot{width:10px;height:10px;border-radius:50%}
.rg-label{font-size:13px;font-weight:600}
.rg-val{font-size:14px;font-weight:800;text-align:right}
.rg-pct{font-size:13px;font-weight:700;color:var(--muted);min-width:34px;text-align:right}
.rg-rec{grid-column:2/5;font-size:10px;color:var(--muted);margin-top:-4px}
.report-foot{margin-top:6px}
.rf-item{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:13px;color:var(--muted)}
.rf-item b{color:var(--text);font-weight:800}
/* ── CUERPO ── */
.body-form{margin:0 18px 14px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px}
.bf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.bf-field label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px;font-weight:600}
.bf-field input{width:100%;height:42px;border-radius:11px;border:1px solid var(--border);background:var(--lifted);color:var(--text);font-size:16px;padding:0 12px;outline:none;text-align:center;font-weight:700}
.bf-field input:focus{border-color:var(--accent)}
.bf-save{width:100%;height:46px;border-radius:13px;background:var(--accent);border:none;color:#fff;font-size:15px;font-weight:800;cursor:pointer}
.body-card{margin:0 18px 10px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px}
.bc-date{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:10px}
.bc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.bc-stat{text-align:center}
.bc-val{font-size:18px;font-weight:800;line-height:1}
.bc-lbl{font-size:10px;color:var(--muted);margin-top:2px}
/* ── MODAL CANTIDAD ── */
.qty-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.qty-sheet{background:var(--card);border-top-left-radius:24px;border-top-right-radius:24px;width:100%;max-width:520px;padding:24px 20px calc(24px + var(--sbt));border-top:1px solid var(--border);animation:sheetUp .25s ease}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.qty-name{font-size:18px;font-weight:800;margin-bottom:4px;letter-spacing:-.3px}
.qty-base{font-size:12px;color:var(--muted);margin-bottom:18px}
.qty-input-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.qty-input-row input{flex:1;height:56px;border-radius:14px;border:1.5px solid var(--accent);background:var(--lifted);color:var(--text);font-size:24px;font-weight:800;padding:0 16px;outline:none;text-align:center}
.qty-unit{font-size:15px;color:var(--muted);font-weight:600;min-width:44px}
.qty-chips{display:flex;gap:7px;flex-wrap:wrap;margin:14px 0 18px}
.qty-chip{padding:8px 14px;border-radius:11px;border:1px solid var(--border);background:var(--lifted);color:var(--muted);font-size:13px;font-weight:700;cursor:pointer}
.qty-chip:active{background:var(--adim);border-color:var(--accent);color:var(--accent)}
.qty-preview{text-align:center;font-size:14px;color:var(--muted);margin-bottom:18px}
.qty-preview b{color:var(--accent);font-size:22px;font-weight:900}
.qty-actions{display:flex;gap:10px}
.qty-cancel{flex:1;height:50px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:15px;font-weight:700;cursor:pointer}
.qty-ok{flex:2;height:50px;border-radius:14px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:800;cursor:pointer}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ec{animation:slideUp .3s ease both}
.ec:nth-child(1){animation-delay:.04s}.ec:nth-child(2){animation-delay:.09s}.ec:nth-child(3){animation-delay:.14s}.ec:nth-child(4){animation-delay:.19s}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-logo">Rodilla<span>.</span></div>
    <div class="phase-tag" id="phaseBadge">Fase 1</div>
  </div>
</header>
<main class="main">
  <div class="tab active" id="tab-hoy"></div>
  <div class="tab" id="tab-semana"></div>
  <div class="tab" id="tab-progreso"></div>
  <div class="tab" id="tab-ciencia"></div>
  <div class="tab" id="tab-comida"></div>
  <div class="tab" id="tab-cuerpo"></div>
</main>
<nav class="nav">
  <div class="ni active" onclick="goTab('hoy',this)">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="ni-lbl">Hoy</span>
  </div>
  <div class="ni" onclick="goTab('semana',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="ni-lbl">Semana</span>
  </div>
  <div class="ni" onclick="goTab('progreso',this)">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span class="ni-lbl">Avance</span>
  </div>

let S={phase:1,startDate:null,sets:{},todayPain:{},kcalGoal:1400,food:{},body:[]};
let timers={};
function loadS(){try{const d=JSON.parse(localStorage.getItem('rf3-state')||'{}');S={...S,...d};if(!S.startDate){S.startDate=today();saveS();}}catch(e){}}
function saveS(){localStorage.setItem('rf3-state',JSON.stringify(S));}
function today(){return new Date().toISOString().split('T')[0];}
function todayIdx(){const d=new Date().getDay();return d===0?6:d-1;}

function goTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  el.classList.add('active');
  ({hoy:renderHoy,semana:renderSemana,progreso:renderProgreso,ciencia:renderCiencia,comida:renderComida,cuerpo:renderCuerpo})[name]();
}

function renderHoy(){
  const idx=todayIdx(),day=WEEK[idx],td=today();
  if(!S.sets[td])S.sets[td]={};
  const phase=PHASES[S.phase-1],pct=getDayPct(day,td);
  let h='';
  h+=`<div class="dh">
    <div class="dh-date">${new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</div>
    <div class="dh-name">${day.emoji} ${day.name}</div>
    <div class="dh-focus">${day.focus}</div>
    <div class="dh-pill" style="color:${day.color};border-color:${day.color};background:${day.color}1a">${day.focus}</div>
  </div>
  <div style="padding:0 18px 10px"><div style="font-size:12px;color:var(--muted)">📍 <span style="color:${phase.color};font-weight:700">Fase ${phase.num}: ${phase.name}</span> · Sem. ${phase.weeks}</div></div>`;
  if(day.restType==='full'){
    h+=`<div class="rest-card"><div class="rest-emoji">😴</div><div class="rest-title">Descanso total</div><div class="rest-text">Hoy el cuerpo asimila el trabajo de la semana. El cartílago se recupera mejor cuando le damos tregua.</div></div>
    <div class="motiv"><div class="motiv-txt">El descanso es parte del entrenamiento</div><div class="motiv-sub">La Behobia te espera 💪</div></div>`;
  } else {
    const pain=S.todayPain[td];
    h+=`<div class="pain-row"><div class="pain-lbl">Dolor hoy:</div><div class="pain-btns">
      ${[0,1,2,3,4,5].map(n=>`<button class="pb${pain===n?' sel':''}" onclick="setPain(${n},'${td}')">${n}</button>`).join('')}
    </div></div>
    <div class="prog-wrap"><div class="prog-label">Completado</div>
    <div class="prog-bar"><div class="prog-fill" id="pf" style="width:${pct}%"></div></div>
    <div class="prog-pct" id="ppct">${pct}%</div></div>
    <div class="exs" style="margin-top:10px">`;
    day.exercises.forEach(ex=>{h+=renderExCard(ex,td);});
    h+=`</div>`;
    if(pct>=100){h+=`<div class="done-banner show"><div class="done-emoji">🎉</div><div class="done-title">¡Sesión completada!</div><div class="done-sub">Un día más hacia la Behobia.</div></div>`;}
    else{h+=`<div class="motiv"><div class="motiv-txt">${motivText(pct)}</div><div class="motiv-sub">Rodilla → Golf → Behobia 🎯</div></div>`;}
  }
  document.getElementById('tab-hoy').innerHTML=h;
  updatePhaseBadge();
  setTimeout(restoreTimers,50);
}

function renderExCard(ex,td){
  const setKeys=Array.from({length:ex.sets},(_,i)=>`${ex.id}_${i}`);
  const allDone=setKeys.every(k=>S.sets[td]?.[k]);
  const dur=ex.duration;
  const durStr=dur?(dur>=60?`${Math.floor(dur/60)}:${String(dur%60).padStart(2,'0')}`:`${dur}s`):'';
  const svg=SVGS[ex.id]||'';
  const stepsHtml=(ex.steps||[]).map((s,i)=>`<div class="ec-step"><div class="ec-step-num">${i+1}</div><div>${s}</div></div>`).join('');

  // Texto corto de lo que hay que hacer en cada serie
  const repsShort=ex.reps.replace(' repeticiones','rep').replace(' segundos','s').replace(' minutos','min').replace(/cada pierna|cada dirección|cada posición/g,'').trim();

  let setsHtml='';

  if(ex.type==='timed'&&dur){
    setsHtml+=`<div class="sets-hint">⏱ Pulsa el botón, espera los ${durStr} y marca la serie completada</div>
    <div class="timer-row">
      <button class="tbtn" id="tbtn-${ex.id}" onclick="toggleTimer('${ex.id}',${dur})">▶ Iniciar ${durStr}</button>
      <div class="tdisp" id="tdisp-${ex.id}">${durStr}</div>
    </div>`;
  } else {
    setsHtml+=`<div class="sets-hint">💪 Haz ${repsShort} y toca la serie para marcarla</div>`;
  }

  setsHtml+=`<div class="sets-row">
    ${setKeys.map((k,i)=>{
      const done=S.sets[td]?.[k];
      return `<button class="sb${done?' done':''}" onclick="toggleSet('${k}','${td}','${ex.id}',${i})">
        <span class="sb-top">${done?'✓ Lista':`Serie ${i+1}`}</span>
        <span class="sb-bot">${done?'completada':repsShort}</span>
      </button>`;
    }).join('')}
  </div>`;

  return `<div class="ec${allDone?' done-card':''}">
    <div class="ec-top"><div class="ec-icon" style="background:${ex.bg}">${ex.icon}</div>
    <div class="ec-meta"><div class="ec-name">${ex.name}</div><div class="ec-spec">${ex.sets} series × ${ex.reps}</div></div></div>
    ${svg?`<div class="ec-svg-wrap">${svg}</div>`:''}
    ${VIDEOS[ex.id]?`<a class="vid-btn" href="${VIDEOS[ex.id]}" target="_blank" rel="noopener">▶ &nbsp;Ver vídeo en YouTube</a>`:''}
    <div class="ec-steps">${stepsHtml}</div>
    ${setsHtml}
    <div class="sci-pill"><span>🔬</span><span>${ex.sci}</span></div>
  </div>`;
}

function getDayPct(day,td){
  if(!day.exercises||!day.exercises.length)return 0;
  const total=day.exercises.reduce((s,ex)=>s+ex.sets,0);
  const done=Object.values(S.sets[td]||{}).filter(v=>v===true).length;
  return total>0?Math.min(100,Math.round(done/total*100)):0;
}
function setPain(n,td){S.todayPain[td]=n;saveS();renderHoy();}
function toggleSet(key,td,exId,setIdx){
  if(!S.sets[td])S.sets[td]={};S.sets[td][key]=!S.sets[td][key];saveS();
  const btn=document.querySelector(`[onclick="toggleSet('${key}','${td}','${exId}',${setIdx})"]`);
  if(btn){
    const v=S.sets[td][key];
    btn.classList.toggle('done',v);
    const top=btn.querySelector('.sb-top');
    const bot=btn.querySelector('.sb-bot');
    const day=WEEK[todayIdx()];
    const ex=day.exercises.find(e=>e.id===exId);
    const repsShort=ex?ex.reps.replace(' repeticiones','rep').replace(' segundos','s').replace(' minutos','min').replace(/cada pierna|cada dirección|cada posición/g,'').trim():'';
    if(top)top.textContent=v?'✓ Lista':`Serie ${setIdx+1}`;
    if(bot)bot.textContent=v?'completada':repsShort;
    const ec=btn.closest('.ec');
    if(ec&&ex){const sk=Array.from({length:ex.sets},(_,i)=>`${ex.id}_${i}`);ec.classList.toggle('done-card',sk.every(k=>S.sets[td]?.[k]));}
    const pct=getDayPct(day,td);const pf=document.getElementById('pf'),ppct=document.getElementById('ppct');
    if(pf)pf.style.width=pct+'%';if(ppct)ppct.textContent=pct+'%';
  }
}
function motivText(pct){
  if(pct===0)return 'La constancia es el único secreto';if(pct<30)return '¡Buen comienzo! El VMO te lo agradece';
  if(pct<60)return '¡Vas a mitad! Esto mueve la aguja';if(pct<90)return 'Casi lista. El cuádriceps ya lo nota';return '¡Último ejercicio!';
}
function fmtTime(s){const m=Math.floor(s/60);return m>0?`${m}:${String(s%60).padStart(2,'0')}`:`${s}s`;}
function toggleTimer(exId,dur){
  const btn=document.getElementById('tbtn-'+exId),disp=document.getElementById('tdisp-'+exId);
  // Si está corriendo → pausa
  if(timers[exId]?.running){
    clearInterval(timers[exId].iv);timers[exId].running=false;
    if(btn)btn.textContent='▶ Continuar';return;
  }
  // Si terminó → reinicia desde cero
  if(timers[exId]?.done) timers[exId]={rem:dur,running:false,done:false};
  const rem=timers[exId]?.rem??dur;
  timers[exId]={running:true,rem,iv:null,done:false};
  if(btn)btn.textContent='⏸ Pausar';
  if(disp)disp.textContent=fmtTime(rem);
  timers[exId].iv=setInterval(()=>{
    timers[exId].rem--;const r=timers[exId].rem;
    const d=document.getElementById('tdisp-'+exId);if(d)d.textContent=fmtTime(Math.max(0,r));
    if(r<=0){clearInterval(timers[exId].iv);timers[exId]={running:false,rem:0,done:true};
    if(d)d.textContent='✓ Listo';const b=document.getElementById('tbtn-'+exId);
    if(b)b.textContent='↺ Repetir';if(navigator.vibrate)navigator.vibrate([200,100,200]);}
  },1000);
}
function restoreTimers(){
  Object.entries(timers).forEach(([exId,ts])=>{
  const d=document.getElementById('tdisp-'+exId),b=document.getElementById('tbtn-'+exId);if(!d)return;
  if(ts.done){d.textContent='✓ Listo';if(b)b.textContent='↺ Repetir';}
  else if(ts.running){d.textContent=fmtTime(ts.rem);if(b)b.textContent='⏸ Pausar';}
  else if(ts.rem>0){d.textContent=fmtTime(ts.rem);if(b)b.textContent='▶ Continuar';}});
}

function renderProgreso(){
  const start=S.startDate?new Date(S.startDate):new Date();
  const weeks=Math.floor((new Date()-start)/864e5/7)+1;
  const sessions=Object.values(S.sets).filter(d=>Object.values(d).some(v=>v===true)).length;
  let h=`<div class="sec"><div class="sec-title">Tu progreso</div></div>
  <div class="stats-row">
    <div class="stat"><div class="stat-val" style="color:var(--accent)">${weeks}</div><div class="stat-lbl">Semana</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--teal)">${sessions}</div><div class="stat-lbl">Sesiones</div></div>
    <div class="stat"><div class="stat-val">🎯</div><div class="stat-lbl">Behobia</div></div>
  </div>
  <div class="sec" style="margin-top:18px"><div class="sec-title">Fases del programa</div></div>
  <div class="phases-grid">`;
  PHASES.forEach((ph,i)=>{const n=i+1,isA=n===S.phase,isD=n<S.phase;
  h+=`<div class="ph-card${isA?' ph-active':''}${isD?' ph-done':''}">
    <div class="ph-num" style="color:${ph.color}">FASE ${ph.num}</div>
    <div class="ph-weeks" style="color:${isA?ph.color:'var(--text)'}">${ph.weeks}</div>
    <div class="ph-desc">${ph.name}</div>
    ${isA?`<div class="ph-dot" style="color:${ph.color}">● Activa</div>`:''}
    ${isD?`<div class="ph-dot" style="color:var(--muted)">✓ Lista</div>`:''}
  </div>`;});
  h+=`</div>`;
  if(S.phase<3){h+=`<div class="advance-wrap"><div class="advance-hint">Avanza cuando lleves 3 semanas sin dolor (≤1/5)</div><button class="advance-btn" onclick="advancePhase()">Avanzar a Fase ${S.phase+1} →</button></div>`;}
  const painEntries=Object.entries(S.todayPain).filter(([,v])=>v!==undefined).sort().slice(-10);
  if(painEntries.length>0){const pc=['#3dd0cc','#3dd0cc','#6ee7b7','#f5c542','#fb923c','#e8715a'];
  h+=`<div class="sec"><div class="sec-title">Historial de dolor</div></div>
  <div style="padding:0 18px"><div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px">
  ${painEntries.map(([date,pain])=>`<div class="ph-row"><div class="ph-date">${new Date(date+'T12:00').toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'})}</div>
  <div class="ph-bar-wrap"><div class="ph-bar" style="width:${pain*18+8}px;background:${pc[pain]||'#e8715a'}"></div>
  <div class="ph-score" style="color:${pc[pain]||'#e8715a'}">${pain}/5</div></div></div>`).join('')}
  </div></div>`;}
  h+=`<div style="padding:14px 18px"><div class="motiv"><div class="motiv-txt">🎯 Objetivo: Behobia 2026</div><div class="motiv-sub">La condropatía grado II mejora con trabajo consistente.</div></div></div>`;
  document.getElementById('tab-progreso').innerHTML=h;
}
function advancePhase(){if(S.phase<3){S.phase++;saveS();renderProgreso();updatePhaseBadge();}}

}

let foodQuery='';
let activeMeal='Desayuno';
const MEALS=['Desayuno','Comida','Cena','Snacks'];
const MEAL_ICONS={Desayuno:'☕',Comida:'🍽',Cena:'🌙',Snacks:'🍎'};

function renderComida(){
  const td=today();
  if(!S.food[td])S.food[td]={items:[]};
  const items=S.food[td].items;
  // dar meal por defecto a items antiguos
  items.forEach(it=>{if(!it.meal)it.meal='Comida';});
  const totals=items.reduce((a,it)=>{a.kcal+=it.kcal;a.p+=it.p;a.g+=it.g;a.c+=it.c;return a;},{kcal:0,p:0,g:0,c:0});
  const goal=S.kcalGoal||1400;
  const rem=goal-Math.round(totals.kcal);
  const pct=Math.min(100,Math.round(totals.kcal/goal*100));
  const ringColor=totals.kcal>goal?'#e8715a':'#3dd0cc';

  let h=`<div class="sec"><div class="sec-title">Comida de hoy</div></div>`;

  // Anillo de calorías
  const circ=2*Math.PI*32;
  const off=circ-(pct/100)*circ;
  h+=`<div class="kcal-ring-wrap">
    <svg width="84" height="84" viewBox="0 0 84 84" style="flex-shrink:0">
      <circle cx="42" cy="42" r="32" fill="none" stroke="var(--lifted)" stroke-width="8"/>
      <circle cx="42" cy="42" r="32" fill="none" stroke="${ringColor}" stroke-width="8" stroke-linecap="round"
        stroke-dasharray="${circ}" stroke-dashoffset="${off}" transform="rotate(-90 42 42)"/>
      <text x="42" y="40" text-anchor="middle" fill="var(--text)" font-size="17" font-weight="800">${Math.round(totals.kcal)}</text>
      <text x="42" y="54" text-anchor="middle" fill="var(--muted)" font-size="10">de ${goal}</text>
    </svg>
    <div style="flex:1">
      <div class="kcal-big" style="color:${rem<0?'#e8715a':'var(--text)'}">${rem<0?'+'+Math.abs(rem):rem}</div>
      <div class="kcal-sub">${rem<0?'kcal por encima del objetivo':'kcal restantes hoy'}</div>
    </div>
  </div>`;

  // Buscador
  h+=`<div class="search-box"><input type="text" id="foodSearch" placeholder="🔍 Buscar alimento (${FOODS.length} disponibles)..." value="${foodQuery}" oninput="onFoodSearch(this.value)"></div>`;

  // Resultados de búsqueda
  if(foodQuery.length>0){
    // Selector de a qué comida añadir
    h+=`<div style="padding:0 18px 10px"><div style="font-size:11px;color:var(--muted);margin-bottom:7px;font-weight:600">AÑADIR A:</div>
      <div style="display:flex;gap:6px">
      ${MEALS.map(m=>`<button class="meal-tab${activeMeal===m?' active':''}" onclick="setMeal('${m}')">${MEAL_ICONS[m]} ${m}</button>`).join('')}
      </div></div>`;
    const q=foodQuery.toLowerCase();
    const matches=FOODS.filter(f=>f[0].toLowerCase().includes(q)).slice(0,15);
    h+=`<div class="food-res">`;
    if(matches.length===0)h+=`<div style="color:var(--muted);font-size:13px;text-align:center;padding:14px">Sin resultados. Prueba otra palabra.</div>`;
    matches.forEach(f=>{
      const[name,kcal,p,g,c,port,unit]=f;
      const portionKcal=Math.round(kcal*port/100);
      h+=`<div class="food-item" onclick="openQty('${name.replace(/'/g,"\\'")}',${kcal},${p},${g},${c},${port},'${unit}')">
        <div class="food-info"><div class="food-name">${name}</div><div class="food-meta">${kcal} kcal/100g · porción ${port}g = ${portionKcal} kcal</div></div>
        <div class="food-add">+</div>
      </div>`;
    });
    h+=`</div>`;
  } else {
    // ── INFORME DE MACROS (tipo FatSecret) ──
    if(items.length>0){
      const pKcal=totals.p*4, gKcal=totals.g*9, cKcal=totals.c*4;
      const tot=pKcal+gKcal+cKcal||1;
      const pPct=Math.round(pKcal/tot*100), gPct=Math.round(gKcal/tot*100), cPct=Math.round(cKcal/tot*100);
      // recomendaciones (rehab + ejercicio): P 25-30%, G 25-30%, C 40-50%
      h+=`<div class="report-card">
        <div class="report-title">📊 Informe nutricional de hoy</div>

        <div class="macro-bar-wrap">
          <div class="macro-bar">
            <div style="width:${pPct}%;background:#3dd0cc"></div>
            <div style="width:${gPct}%;background:#f4a261"></div>
            <div style="width:${cPct}%;background:#a78bfa"></div>
          </div>
        </div>

        <div class="report-grid">
          <div class="rg-item">
            <div class="rg-dot" style="background:#3dd0cc"></div>
            <div class="rg-label">Proteínas</div>
            <div class="rg-val">${Math.round(totals.p)}g</div>
            <div class="rg-pct">${pPct}%</div>
            <div class="rg-rec">rec. 25-30%</div>
          </div>
          <div class="rg-item">
            <div class="rg-dot" style="background:#f4a261"></div>
            <div class="rg-label">Grasas</div>
            <div class="rg-val">${Math.round(totals.g)}g</div>
            <div class="rg-pct">${gPct}%</div>
            <div class="rg-rec">rec. 25-30%</div>
          </div>
          <div class="rg-item">
            <div class="rg-dot" style="background:#a78bfa"></div>
            <div class="rg-label">Carbohidratos</div>
            <div class="rg-val">${Math.round(totals.c)}g</div>
            <div class="rg-pct">${cPct}%</div>
            <div class="rg-rec">rec. 40-50%</div>
          </div>
        </div>

        <div class="report-foot">
          <div class="rf-item"><span>Calorías totales</span><b>${Math.round(totals.kcal)} kcal</b></div>
          <div class="rf-item"><span>Objetivo diario</span><b>${goal} kcal</b></div>
          <div class="rf-item"><span>Proteína / kg peso*</span><b>${S.body&&S.body.length?((totals.p)/([...S.body].sort((a,b)=>b.date.localeCompare(a.date))[0].peso)).toFixed(1):'—'} g/kg</b></div>
        </div>
        ${S.body&&S.body.length?`<div style="font-size:10px;color:var(--muted);margin-top:6px">*según tu último peso registrado. Objetivo en rehab: 1.6-2g/kg para conservar músculo.</div>`:''}
      </div>`;
    }

    // ── COMIDAS SEPARADAS ──
    MEALS.forEach(meal=>{
      const mealItems=items.map((it,gi)=>({...it,gi})).filter(it=>it.meal===meal);
      const mKcal=mealItems.reduce((s,it)=>s+it.kcal,0);
      h+=`<div class="meal-block">
        <div class="meal-block-head">
          <span>${MEAL_ICONS[meal]} ${meal}</span>
          <span class="meal-block-kcal">${Math.round(mKcal)} kcal</span>
        </div>`;
      if(mealItems.length===0){
        h+=`<div class="meal-empty" onclick="setMeal('${meal}');focusSearch()">+ Añadir a ${meal.toLowerCase()}</div>`;
      } else {
        mealItems.forEach(it=>{
          h+=`<div class="logged">
            <div class="food-info"><div class="food-name">${it.name}</div><div class="food-meta">${it.qty}g · ${Math.round(it.kcal)} kcal · P:${Math.round(it.p)} G:${Math.round(it.g)} C:${Math.round(it.c)}</div></div>
            <div class="logged-del" onclick="delFood(${it.gi})">✕</div>
          </div>`;
        });
      }
      h+=`</div>`;
    });

    if(items.length===0){
      h+=`<div style="padding:8px 18px 0;text-align:center;color:var(--muted);font-size:13px">Busca un alimento arriba para empezar 🍎</div>`;
    }
  }

  h+=`<div style="height:12px"></div>`;
  document.getElementById('tab-comida').innerHTML=h;
}

function setMeal(m){activeMeal=m;renderComida();const inp=document.getElementById('foodSearch');if(inp&&foodQuery){inp.focus();}}
function focusSearch(){const inp=document.getElementById('foodSearch');if(inp)inp.focus();}
function onFoodSearch(v){foodQuery=v;renderComida();const inp=document.getElementById('foodSearch');if(inp){inp.focus();inp.setSelectionRange(v.length,v.length);}}

let qtyData=null;

function openQty(name,kcal,p,g,c,port,unit){
  qtyData={name,kcal,p,g,c,port,unit};
  const isUnit=unit!=='g';
  const startVal=port;
  let overlay=document.getElementById('qtyOverlay');
  if(!overlay){
    overlay=document.createElement('div');
    overlay.id='qtyOverlay';
    document.body.appendChild(overlay);
  }
  // chips de cantidades rápidas
  const chips=isUnit
    ? [[`½ ${unit}`,port*0.5],[`1 ${unit}`,port],[`2 ${unit}`,port*2],[`3 ${unit}`,port*3]]
    : [['50g',50],['100g',100],['150g',150],['200g',200]];
  overlay.className='qty-overlay';
  overlay.innerHTML=`<div class="qty-sheet" onclick="event.stopPropagation()">
    <div class="qty-name">${name}</div>
    <div class="qty-base">${kcal} kcal por 100g${isUnit?` · 1 ${unit} ≈ ${port}g`:''}</div>
    <div class="qty-input-row">
      <input type="number" id="qtyInput" inputmode="numeric" value="${startVal}" oninput="updateQtyPreview()">
      <span class="qty-unit">gramos</span>
    </div>
    <div class="qty-chips">
      ${chips.map(([lbl,val])=>`<div class="qty-chip" onclick="setQty(${Math.round(val)})">${lbl}</div>`).join('')}
    </div>
    <div class="qty-preview" id="qtyPreview"></div>
    <div class="qty-actions">
      <button class="qty-cancel" onclick="closeQty()">Cancelar</button>
      <button class="qty-ok" onclick="confirmQty()">Añadir</button>
    </div>
  </div>`;
  overlay.onclick=closeQty;
  updateQtyPreview();
}

function setQty(g){const inp=document.getElementById('qtyInput');if(inp){inp.value=g;updateQtyPreview();}}

function updateQtyPreview(){
  if(!qtyData)return;
  const g=parseFloat(document.getElementById('qtyInput').value)||0;
  const kcal=Math.round(qtyData.kcal*g/100);
  const p=Math.round(qtyData.p*g/100);
  const gr=Math.round(qtyData.g*g/100);
  const c=Math.round(qtyData.c*g/100);
  const prev=document.getElementById('qtyPreview');
  if(prev)prev.innerHTML=`<b>${kcal}</b> kcal &nbsp;·&nbsp; P:${p}g  G:${gr}g  C:${c}g`;
}

function confirmQty(){
  if(!qtyData)return;
  const g=parseFloat(document.getElementById('qtyInput').value)||0;
  if(g<=0){closeQty();return;}
  const td=today();
  if(!S.food[td])S.food[td]={items:[]};
  S.food[td].items.push({
    name:qtyData.name,qty:Math.round(g),meal:activeMeal,
    kcal:qtyData.kcal*g/100,p:qtyData.p*g/100,g:qtyData.g*g/100,c:qtyData.c*g/100
  });
  saveS();closeQty();foodQuery='';renderComida();
}

function closeQty(){const o=document.getElementById('qtyOverlay');if(o)o.remove();qtyData=null;}

function delFood(i){const td=today();S.food[td].items.splice(i,1);saveS();renderComida();}

function renderCuerpo(){
  let h=`<div class="sec"><div class="sec-title">Registro corporal · Healthkeep</div></div>`;

  // Formulario
  h+=`<div class="body-form">
    <div style="font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px">📲 Pésate con la app Feelfit y copia aquí los datos. Puedes cambiar la fecha para meter pesajes antiguos.</div>
    <div class="bf-field" style="margin-bottom:10px"><label>Fecha del pesaje</label><input type="date" id="b_fecha" value="${today()}" style="text-align:left"></div>
    <div class="bf-grid">
      <div class="bf-field"><label>Peso (kg)</label><input type="number" step="0.1" id="b_peso" inputmode="decimal" placeholder="0.0"></div>
      <div class="bf-field"><label>Grasa (%)</label><input type="number" step="0.1" id="b_grasa" inputmode="decimal" placeholder="0.0"></div>
      <div class="bf-field"><label>Músculo (%)</label><input type="number" step="0.1" id="b_musculo" inputmode="decimal" placeholder="0.0"></div>
      <div class="bf-field"><label>Agua (%)</label><input type="number" step="0.1" id="b_agua" inputmode="decimal" placeholder="0.0"></div>
    </div>
    <button class="bf-save" onclick="saveBody()">Guardar pesaje</button>
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
      <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:8px;font-weight:600">📥 IMPORTAR CSV (fecha,peso,grasa,musculo,agua)</label>
      <input type="file" id="csvFile" accept=".csv" onchange="importCSV(this)" style="font-size:12px;color:var(--muted);width:100%">
    </div>
  </div>`;

  // Evolución
  const arr=[...(S.body||[])].sort((a,b)=>b.date.localeCompare(a.date));
  if(arr.length>=2){
    const last=arr[0],prev=arr[1];
    const dPeso=(last.peso-prev.peso).toFixed(1);
    const dGrasa=(last.grasa-prev.grasa).toFixed(1);
    h+=`<div class="sec"><div class="sec-title">Cambio desde el último pesaje</div></div>
    <div class="macro-row">
      <div class="macro"><div class="macro-val" style="color:${dPeso<=0?'#3dd0cc':'#f4a261'}">${dPeso>0?'+':''}${dPeso}</div><div class="macro-lbl">KG PESO</div></div>
      <div class="macro"><div class="macro-val" style="color:${dGrasa<=0?'#3dd0cc':'#e8715a'}">${dGrasa>0?'+':''}${dGrasa}</div><div class="macro-lbl">% GRASA</div></div>
    </div>`;
  }

  // Histórico
  if(arr.length>0){
    h+=`<div class="sec"><div class="sec-title">Historial</div></div>`;
    arr.forEach(b=>{
      h+=`<div class="body-card">
        <div class="bc-date">${new Date(b.date+'T12:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
        <div class="bc-grid">
          <div class="bc-stat"><div class="bc-val" style="color:var(--text)">${b.peso}</div><div class="bc-lbl">kg</div></div>
          <div class="bc-stat"><div class="bc-val" style="color:#e8715a">${b.grasa||'—'}</div><div class="bc-lbl">% grasa</div></div>
          <div class="bc-stat"><div class="bc-val" style="color:#3dd0cc">${b.musculo||'—'}</div><div class="bc-lbl">% músculo</div></div>
        </div>
        ${b.agua?`<div style="text-align:center;margin-top:8px;font-size:12px;color:var(--muted)">💧 ${b.agua}% agua</div>`:''}
      </div>`;
    });
  } else {
    h+=`<div style="padding:8px 18px;text-align:center;color:var(--muted);font-size:14px">Aún no hay pesajes registrados.</div>`;
  }
  h+=`<div style="height:12px"></div>`;
  document.getElementById('tab-cuerpo').innerHTML=h;
}

function saveBody(){
  const peso=parseFloat(document.getElementById('b_peso').value);
  if(!peso){alert('Pon al menos el peso');return;}
  const fecha=document.getElementById('b_fecha').value||today();
  const grasa=parseFloat(document.getElementById('b_grasa').value)||null;
  const musculo=parseFloat(document.getElementById('b_musculo').value)||null;
  const agua=parseFloat(document.getElementById('b_agua').value)||null;
  if(!S.body)S.body=[];
  S.body=S.body.filter(b=>b.date!==fecha);
  S.body.push({date:fecha,peso,grasa,musculo,agua});
  saveS();renderCuerpo();
}

function importCSV(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const text=e.target.result;
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(!S.body)S.body=[];
      let added=0;
      lines.forEach((line,i)=>{
        const parts=line.split(/[,;]/).map(p=>p.trim());
        // saltar cabecera si la primera celda no parece fecha
        if(i===0 && !/\d{4}-\d{2}-\d{2}|\d{1,2}\/\d{1,2}\/\d{2,4}/.test(parts[0]))return;
        let[fecha,peso,grasa,musculo,agua]=parts;
        // normalizar fecha DD/MM/YYYY → YYYY-MM-DD
        if(fecha.includes('/')){const[d,m,y]=fecha.split('/');fecha=`${y.length===2?'20'+y:y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;}
        const p=parseFloat(peso);
        if(!fecha||!p)return;
        S.body=S.body.filter(b=>b.date!==fecha);
        S.body.push({date:fecha,peso:p,grasa:parseFloat(grasa)||null,musculo:parseFloat(musculo)||null,agua:parseFloat(agua)||null});
        added++;
      });
      saveS();renderCuerpo();
      alert(`✓ Importados ${added} pesajes`);
    }catch(err){alert('Error leyendo el CSV. Revisa el formato: fecha,peso,grasa,musculo,agua');}
  };
  reader.readAsText(file);
}

function updatePhaseBadge(){
  const ph=PHASES[S.phase-1],b=document.getElementById('phaseBadge');
  if(!b)return;b.textContent=`Fase ${ph.num} · ${ph.name}`;b.style.background=ph.color+'25';b.style.color=ph.color;
}

loadS();renderHoy();
</script>
